---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma4-e4b
spec:
  source: hf://daniloreddy/gemma-4-E4B-it_GGUF
  files:
    - gemma-4-E4B-it_Q4_K_M.gguf
  format: gguf
  quantization: Q4_K_M
  hardware:
    accelerator: intel
    gpu:
      enabled: true
      vendor: intel
      layers: 99
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llmkube-models-gpu
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma4-e4b
spec:
  modelRef: gemma4-e4b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan@sha256:25932f6dde7478203be75a04651d210ff1a5f0ac7877fb61f4fa622943bea6df
  replicas: 1
  priority: normal
  contextSize: 8192
  parallelSlots: 1
  batchSize: 512
  uBatchSize: 512
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
  extraArgs:
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --mmap
  endpoint:
    port: 8080
    type: ClusterIP
  resources:
    cpu: 100m
    memory: 6Gi
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 360
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 6
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
