---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: flux
spec:
  image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.54.1@sha256:b0d648eefa9b44b10b97f419ae3573d81aaeab59f034d986d3f8282113dc03a5
  transport: streamable-http
  proxyMode: streamable-http
  proxyPort: 8080
  mcpPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  serviceAccount: flux-mcp
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          args:
            - serve
            - --transport=http
            - --port=8000
          env:
            # In-cluster mode: no KUBECONFIG; uses the pod service account.
            - name: RUNTIME_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
  groupRef:
    name: mcp-tools
