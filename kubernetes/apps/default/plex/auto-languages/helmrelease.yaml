---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-auto-languages
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: plex
      namespace: default
  values:
    controllers:
      auto-languages:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/journeydocker/plex-auto-languages
              tag: 1.5.4@sha256:50e8efa4e51ad7d6bf14e8905f344836e8beaccae5c44b8fb3404c0e2b6e9b00
            envFrom:
              - secretRef:
                  name: plex-auto-languages-secret
            env:
              TZ: ${TZ}
              PLEX_URL: http://plex.default.svc.cluster.local:32400
              REFRESH_LIBRARY_ON_SCAN: false
            resources:
              requests:
                cpu: 34m
                memory: 466Mi
              limits:
                memory: 466Mi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        enabled: true
        type: emptyDir
      local:
        type: emptyDir
        globalMounts:
          - path: /.local
