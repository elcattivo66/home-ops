---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname matterbridge
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  components:
    - ../../../../components/volsync/local
  dependsOn:
    - name: multus-networks
      namespace: networking
    - name: volsync
      namespace: volsync-system
    - name: certificates
      namespace: networking
  path: ./kubernetes/apps/default/matterbridge/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  postBuild:
    substitute:
      APP: *appname
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_PGID: "0"
      VOLSYNC_PUID: "0"
  wait: false
