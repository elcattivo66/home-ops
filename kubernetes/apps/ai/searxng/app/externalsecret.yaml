---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-secret
spec:
  target:
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        SEARXNG_SECRET: "{{ .SEARXNG_SECRET_KEY }}"
  data:
    - secretKey: SEARXNG_SECRET_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 866c7b7-8d7d-4b41-9869-ec7c5178f25b
        property: secret_key
