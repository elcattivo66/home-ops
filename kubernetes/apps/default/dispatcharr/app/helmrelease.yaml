---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      dispatcharr:
        pod:
          hostUsers: false
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: Always
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: dispatcharr-gpu
          annotations:
            reloader.stakater.com/auto: "true"
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-vpn",
                "namespace": "networking",
                "ips": ["192.168.70.10/24"],
                "mac": "2e:54:30:22:3f:74"
              }]
        initContainers:
          chown-dbdir:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - /bin/sh
              - -c
            args:
              - |
                mkdir -p /data/db
                chmod 0750 /data/db
            securityContext:
              runAsUser: 0
        containers:
          app:
            image: &image
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.27.2@sha256:f2b5ea3128b0513feb07efee7539ad546f3ba3a9095f19936f446f75b8baa894
            env: &env
              TZ: ${TZ}
              DISPATCHARR_ENV: modular
              DISPATCHARR_LOG_LEVEL: info
              DISPATCHARR_PORT: &port 80
              REDIS_HOST: dispatcharr-dragonfly.default.svc.cluster.local
              REDIS_PORT: 6379
              PYTHONDONTWRITEBYTECODE: 1
              UWSGI_HARAKIRI: "120"
              UWSGI_NICE_LEVEL: "0"
              UWSGI_RLIMIT_NOFILE: "65535"
              CELERY_NICE_LEVEL: "10"
            envFrom:
              - secretRef:
                  name: dispatcharr-secret
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
              limits:
                memory: 6Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 4
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

          celery:
            image: *image
            command: ["/app/docker/entrypoint.celery.sh"]
            env:
              <<: *env
              DJANGO_SETTINGS_MODULE: dispatcharr.settings
              PYTHONUNBUFFERED: 1
            envFrom:
              - secretRef:
                  name: dispatcharr-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 9192
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      external:
        hostnames:
          - "{{.Release.Name}}.${SECRET_DOMAIN}"
          - "stream.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: dispatcharr
                port: *port
    persistence:
      data:
        existingClaim: dispatcharr
        globalMounts:
          - path: /data
            subPath: data
          - path: /app/media
            subPath: media
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
