---
# yaml-language-server: $$schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${APP}-postgres
spec:
  targetNamespace: databases
  commonMetadata:
    labels:
      app.kubernetes.io/name: ${APP}-postgres
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: databases
    - name: external-secrets-stores
      namespace: external-secrets
  path: ./kubernetes/components/postgres-db/manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  postBuild:
    substitute:
      APP: ${APP}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_BITWARDEN_ID: ${DB_BITWARDEN_ID}
