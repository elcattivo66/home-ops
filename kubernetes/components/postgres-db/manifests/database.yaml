---
# yaml-language-server: $$schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres-${APP}
spec:
  cluster:
    name: postgres
  name: ${DB_NAME}
  owner: ${DB_USER}
  databaseReclaimPolicy: ${DB_RECLAIM_POLICY:-retain}
