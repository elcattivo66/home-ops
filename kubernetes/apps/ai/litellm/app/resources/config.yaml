  - model_name: go-minimax-m3
    model_info:
      mode: chat
      input_cost_per_token: 0.0000003000
      cache_creation_input_token_cost: 0.0000003000
      cache_read_input_token_cost: 0.0000000600
      output_cost_per_token: 0.0000012000
      max_input_tokens: 1000000
      max_output_tokens: 32768
      supports_function_calling: true
      supports_prompt_caching: true
    litellm_params:
      model: openai/minimax-m3
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_GO_API_KEY

general_settings:
  health_check_endpoint: /v1/health

router_settings:
  routing_strategy: simple-shuffle
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT

litellm_settings:
  success_callback: ["prometheus"]
  prometheus_adapter: true
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
  drop_params: false
  request_timeout: 600
  num_retries: 2
  retry_after: 5
  set_verbose: false

environment:
  - LLAMA_API_KEY
  - OPENCODE_GO_API_KEY
  - REDIS_HOST
  - REDIS_PORT
