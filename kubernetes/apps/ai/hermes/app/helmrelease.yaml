---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            args:
              - gateway
              - run
            env:
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &port 8642
              GOPATH: /opt/data/go
              HERMES_HOME: /opt/data
              HOME: /opt/data
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PATH: /opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: ${TZ}
            envFrom:
              - secretRef:
                  name: hermes-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              limits:
                memory: 4Gi
              requests:
                cpu: 50m
                memory: 512Mi
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp /run/config/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
          install-tools:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /opt/data/.local/bin /opt/data/.local/go
                rm -f /opt/data/.local/bin/hermes /opt/data/.local/bin/docker
                if [ ! -f /opt/data/.local/bin/gh ]; then
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /opt/data/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi
                if [ ! -f /opt/data/.local/go/bin/go ]; then
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /opt/data/.local/
                  rm -rf go.tar.gz
                fi
                if [ ! -f /opt/data/.local/homebrew/bin/brew ]; then
                  export HOMEBREW_PREFIX=/opt/data/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi
          dashboard:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
            env:
              TZ: ${TZ}
              GATEWAY_HEALTH_URL: http://localhost:8642
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        advancedMounts:
          hermes:
            init:
              - path: /run/config/config.yaml
                subPath: config.yaml
        defaultMode: 0o755
        type: configMap
        name: hermes-configmap
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/data
      tmpfs:
        globalMounts:
          - path: /tmp
            subPath: tmp
        type: emptyDir
    route:
      app:
        hostnames:
          - "hermes.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 9119
    service:
      app:
        ports:
          agent:
            port: *port
          http:
            port: 9119
