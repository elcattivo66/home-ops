---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kyoo
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.0
  url: oci://ghcr.io/zoriya/helm-charts/kyoo
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kyoo
spec:
  chartRef:
    kind: OCIRepository
    name: kyoo
  dependsOn: []
  interval: 15m
  values:
    global:
      podAnnotations:
        reloader.stakater.com/auto: "true"

      postgres:
        shared:
          host: &pghost postgres-rw.databases.svc.cluster.local
          port: 5432
          databaseOverride: *app
          existingSecret: &secret kyoo-secret
          userKey: POSTGRES_USER
          passwordKey: POSTGRES_PASSWORD
        kyoo_api:
          sslmode: allow

    kyoo:
      address: https://kyoo.${SECRET_DOMAIN}
      middlewareRootURL: https://kyoo.${SECRET_DOMAIN}
      libraryIgnorePattern: ".*/([dD]ownloads?|audiobooks|documentaries|e-classes|ebooks|fitness_videos|music)/.*"
      transcoderAcceleration: vaapi # hardware acceleration profile (valid values: disabled, vaapi, qsv, nvidia)
      auth:
        apikeys:
          scanner:
            existingSecret: *secret
            apikeyKey: KYOO_API_KEY
      oidc_providers:
        - name: Authelia
          existingSecret: *secret
          clientIdKey: OIDC_AUTHELIA_CLIENTID
          clientSecretKey: OIDC_AUTHELIA_SECRET
          logo: https://www.authelia.com/images/branding/logo-cropped.png
          authorizationAddress: https://authelia.${SECRET_DOMAIN}/api/oidc/authorization
          tokenAddress: https://authelia.${SECRET_DOMAIN}/api/oidc/token
          profileAddress: https://authelia.${SECRET_DOMAIN}/api/oidc/userinfo
          scope: "openid email profile"
          authMethod: ClientSecretBasic
    media:
      volumes:
        - name: media
          nfs:
            server: nas.${SECRET_HOME_DOMAIN}
            path: /spool/media
    contentdatabase:
      tmdb:
        apikeyKey: TMDB_API_KEY
        existingSecret: *secret
      tvdb:
        apikeyKey: TVDB_APIKEY
        pinKey: TVDB_PIN
        existingSecret: *secret
    api:
      persistence:
        existingClaim: *app
      kyoo_api:
        resources:
          requests:
            cpu: 10m
            memory: 1Gi
          limits:
            memory: 8Gi
      extraInitContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.4
          env:
            - name: INIT_POSTGRES_HOST
              value: *pghost
            - name: INIT_POSTGRES_SUPER_PASS
              valueFrom:
                secretKeyRef:
                  name: *secret
                  key: INIT_POSTGRES_SUPER_PASS
            - name: INIT_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: *secret
                  key: INIT_POSTGRES_USER
            - name: INIT_POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: *secret
                  key: INIT_POSTGRES_PASS
            - name: INIT_POSTGRES_DBNAME
              value: kyoo
        # Create pg_trgm extension as superuser (required for full-text search)
        - name: init-extensions
          image: ghcr.io/home-operations/postgres-init:18.4
          env:
            - name: PGHOST
              value: *pghost
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: *secret
                  key: INIT_POSTGRES_SUPER_PASS
            - name: PGDATABASE
              value: kyoo
          command:
            - /bin/bash
            - -c
            - |
              until pg_isready; do echo "Waiting for postgres..."; sleep 1; done
              echo "Creating schema and extension..."
              psql -c "CREATE SCHEMA IF NOT EXISTS kyoo;"
              psql -c "CREATE EXTENSION IF NOT EXISTS pg_trgm SCHEMA kyoo;"
              echo "Done."
    auth:
      kyoo_auth:
        resources:
          requests:
            cpu: 20m
            memory: 50Mi
          limits:
            memory: 500Mi
    front:
      kyoo_front:
        resources:
          requests:
            cpu: 20m
            memory: 50Mi
          limits:
            memory: 500Mi
    scanner:
      kyoo_scanner:
        resources:
          requests:
            cpu: 5m
            memory: 100Mi
          limits:
            memory: 1Gi
    transcoder:
      # persistence:
      #   existingClaim: *app
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: kyoo-gpu
      kyoo_transcoder:
        resources:
          claims:
            - name: gpu
          requests:
            cpu: 100m
            memory: 500Mi
          limits:
            memory: 4Gi
    postgres:
      enabled: false
    ingress:
      enabled: false
    traefikproxy:
      enabled: false
    extraObjects:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: kyoo
        spec:
          hostnames: ["https://kyoo.${SECRET_DOMAIN}"]
          parentRefs:
            - name: envoy-external
              namespace: network
          rules:
            - name: api
              matches:
                - path:
                    type: PathPrefix
                    value: /api
                - path:
                    type: PathPrefix
                    value: /swagger
              backendRefs:
                - name: kyoo-api
                  namespace: media
                  port: 3567
            - name: auth
              matches:
                - path:
                    type: PathPrefix
                    value: /auth
                - path:
                    type: PathPrefix
                    value: /.well-known
              backendRefs:
                - name: kyoo-auth
                  namespace: media
                  port: 4568
            - name: transcoder
              matches:
                - path:
                    type: PathPrefix
                    value: /video
              backendRefs:
                - name: kyoo-transcoder
                  namespace: media
                  port: 7666
            - name: scanner
              matches:
                - path:
                    type: PathPrefix
                    value: /scanner
              backendRefs:
                - name: kyoo-scanner
                  namespace: media
                  port: 4389
            - name: front
              backendRefs:
                - name: kyoo-front
                  namespace: media
                  port: 8901
      - apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: SecurityPolicy
        metadata:
          name: kyoo-auth
        spec:
          targetRefs:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: kyoo
              sectionName: api
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: kyoo
              sectionName: transcoder
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: kyoo
              sectionName: scanner
          extAuth:
            headersToExtAuth:
              - Authorization
              - X-Api-Key
              - cookie
            recomputeRoute: true
            http:
              backendRefs:
                - name: kyoo-auth
                  namespace: media
                  port: 4568
              path: /auth/jwt
              headersToBackend:
                - Authorization
