---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.30.4@sha256:7a3fe51cf50e0a6ddbcd054247d160baa90eb1935700bb59f3e96aa9a6da5025
            securityContext:
              privileged: true # Needed for iGPU device access
            env:
              OLLAMA_MODELS: &modelPath /models
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_CONTEXT_LENGTH: 8192
              OLLAMA_KV_CACHE_TYPE: f16
              OLLAMA_MAX_QUEUE: 8
              OLLAMA_KEEP_ALIVE: 30m
              OLLAMA_VULKAN: 1
              OLLAMA_IGPU_ENABLE: 1
              OLLAMA_NO_CLOUD: 1
              # OLLAMA_FLASH_ATTENTION: 1
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
              limits:
                memory: 16Gi
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: ollama-gpu
          nodeSelector:
            kubernetes.io/arch: amd64
            kubernetes.io/hostname: nuc14
    service:
      app:
        ports:
          http:
            port: &port 11434
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
    persistence:
      ollama:
        existingClaim: *app
        globalMounts:
          - path: *modelPath
            subPath: models
          - path: /root/.ollama
            subPath: config
      dri:
        type: hostPath
        hostPath: /dev/dri
